name: Update Profile README

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  models: read

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate profile data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/generate-profile.sh
          bash scripts/generate-profile.sh

      - name: Translate blog posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/translate-blog.sh
          bash scripts/translate-blog.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md repos.json readmes/ .cache/ blog/ blog-de/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update profile README and repos.json

          Auto-generated by GitHub Actions"
            git push
          fi
